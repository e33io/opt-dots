<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Preferred system fonts -->
<fontconfig>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>PlexSerifMod</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>PlexMonoMod</family>
      <!-- Fallback fonts for icons -->
      <family>FontAwesome</family>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>
</fontconfig>
